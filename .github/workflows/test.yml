name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Fast: ring.exe check + RC verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install LLVM
        run: choco install llvm -y
      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build runtime
        run: clang++ -c ring_runtime.cpp -o ring_runtime.o -std=c++17 -O2 -D_CRT_SECURE_NO_WARNINGS
      - name: Link ring.exe
        run: |
          clang compiler/dist-llvm/main.o ring_runtime.o -o ring.exe -lmsvcrt "-Wl,/STACK:536870912" "-Wl,/MANIFEST:NO" "-LC:\Program Files\LLVM\lib" -lLLVM-C
      - name: Run check + RC suite
        run: python tests/run_tests.py --suite rc

  test:
    # Medium: e2e + llvm golden full suite
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install LLVM
        run: choco install llvm -y
      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build runtime
        run: clang++ -c ring_runtime.cpp -o ring_runtime.o -std=c++17 -O2 -D_CRT_SECURE_NO_WARNINGS
      - name: Link ring.exe
        run: |
          clang compiler/dist-llvm/main.o ring_runtime.o -o ring.exe -lmsvcrt "-Wl,/STACK:536870912" "-Wl,/MANIFEST:NO" "-LC:\Program Files\LLVM\lib" -lLLVM-C
      - name: Run e2e + llvm tests
        run: python tests/run_tests.py --suite e2e --suite llvm

